name: Update FFTA mandats

on:
  schedule:
    # Tous les jours à 05:15 UTC (06:15 Paris l’hiver, 07:15 l’été)
    - cron: "15 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run updater
        env:
          CSV_PATH: concours26.csv
          MAX_PAGES: "160"
          MATCH_THRESHOLD: "0.60"
          SLEEP_S: "0.4"
        run: |
          python scripts/update_mandats.py

      - name: Commit & push if changed
        run: |
          if git status --porcelain | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add concours26.csv
            git commit -m "chore: auto-update FFTA mandats"
            git push
          else
            echo "No changes."
          fi
