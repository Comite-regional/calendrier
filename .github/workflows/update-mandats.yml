name: Update FFTA mandats

on:
  schedule:
    - cron: "15 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run updater
        env:
          CSV_PATH: concours26.csv
          BASE_PROXY_URL: https://ffta-proxy.s-general.workers.dev/
          MAX_PAGES: "80"
          SLEEP_S: "0.4"
          REQUEST_TIMEOUT: "30"
          STOP_AFTER_EMPTY_PAGES: "5"
          STOP_AFTER_ERROR_PAGES: "5"
        run: |
          python scripts/update_mandats.py

      - name: Commit & push if changed
        run: |
          if git status --porcelain | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add concours26.csv
            git commit -m "chore: auto-update FFTA mandats"
            git push
          else
            echo "No changes."
          fi
